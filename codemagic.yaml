workflows:
  shikhaya-android:
    name: Shikhaya Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Unzip project source
        script: |
          unzip -o shikhaya_app_source.zip
      - name: Generate missing platform folders
        script: |
          cd shikhaya
          flutter create . --project-name shikhaya --org com.shikhaya --platforms android
      - name: Get Flutter packages
        script: |
          cd shikhaya
          flutter pub get
      - name: Build APK
        script: |
          cd shikhaya
          flutter build apk --release
    artifacts:
      - shikhaya/build/**/outputs/**/*.apk
